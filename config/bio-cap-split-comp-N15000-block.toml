# Bio aug N=5000, bridge=5% — same compute as bridge=10% variant.
# 5k people: 5% BRIDGE (~237), ~47.5% DECL-only, ~47.5% QA-only, 250 NEVER-SEEN.
# K=10 phrasings, ~7800 params/person, ~2.55M tokens, ~810 epochs in 15k steps.

[data]
train_bin = "data/bio-cap-split-comp-N15000-K10-T8-block/bio_train_*.bin"
val_bin = ""

[model]
n_layer = 12
n_embd = 256
n_head = 8
block_size = 512
vocab_size = 100514
weight_tying = false
use_rope = true
rope_base = 10000.0

[training]
max_iters = 45000
batch_size = 32
gradient_accumulation_steps = 8
eval_interval = 500
eval_iters = 0
log_interval = 10
always_save_checkpoints = true
seed = 64

[optimizer]
learning_rate = 3e-4
weight_decay = 0.0

[lr]
decay_lr = true
warmup_iters = 1000
lr_decay_iters = 45000
min_lr = 3e-5

[system]
compile = true
dtype = "bfloat16"

[logging]
wandb_log = true
wandb_project = "translation-compression"
wandb_run_name = "bio-cap-split-comp-N15000-block"
wandb_group = "bio-capacity"
wandb_notes = "12-256 GPT-2 BPE, 5k people, 0% bridge (no overlap), K=10 phrasings, ~810 epochs in 15k steps"

[experiment]
n_compartments = 1
compartment_scaling = "equal"
translation_ratio = 0
translation_ratio_mode = "absolute"
max_compartments = 16
use_compartment_embeddings = false
permute_tokens_per_compartment = false
permute_input_tokens_per_compartment = false
