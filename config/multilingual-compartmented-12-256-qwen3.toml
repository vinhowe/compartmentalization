# Multilingual experiment: COMPARTMENTED tokenizer (2 × Qwen3 152k = 304k).
# 12-256 model, EN→[0,V), ZH→[V,2V) via offset; same trunk, doubled embedding.
# Same training data composition as the shared run, just relabeled to a disjoint vocab slice.

[data]
train_bin = "data/wiki-mixed-compartmented-qwen3-shuffled/wiki_train_*.bin"
val_bin = "data/wiki-mixed-compartmented-qwen3-shuffled/wiki_val_*.bin"

[model]
n_layer = 12
n_embd = 256
n_head = 8
block_size = 512
vocab_size = 303872              # 2 × 151936
weight_tying = false
use_rope = true
rope_base = 10000.0

[training]
max_iters = 12000                # placeholder; mirror shared
batch_size = 32                  # compartmented vocab 304k → halve batch to keep logits buffer ~10 GB
gradient_accumulation_steps = 8  # effective batch 256, matches shared
eval_interval = 500
eval_iters = 4
log_interval = 10
always_save_checkpoints = true
seed = 64

[optimizer]
learning_rate = 3e-4
weight_decay = 0.0

[lr]
decay_lr = true
warmup_iters = 1000
lr_decay_iters = 12000
min_lr = 3e-5

[system]
compile = true
dtype = "bfloat16"

[logging]
wandb_log = true
wandb_project = "translation-compression"
wandb_run_name = "multilingual-compartmented-12-256-qwen3"
wandb_group = "multilingual-wiki-qwen3"
wandb_notes = "Compartmented (2x Qwen3 152k), EN+ZH wiki, EN ids [0,V), ZH ids [V,2V)"

[experiment]
n_compartments = 1               # we're not using the compartment infrastructure;
                                 # the doubling is just a vocab_size doubling with offset applied at data prep.
compartment_scaling = "equal"
translation_ratio = 0
translation_ratio_mode = "absolute"
max_compartments = 16
use_compartment_embeddings = false
permute_tokens_per_compartment = false
permute_input_tokens_per_compartment = false
