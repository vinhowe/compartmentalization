# Deceptive c=8 variant B: 2 real compartments (0, 1) + 6 "decoy" compartments
# (2..7) each in their OWN vocab chunk with a distinct random permutation.
# Same LM/translation mass distribution as the shared-chunk variant; only the
# vocab layout differs.
#
# Vocab layout (8x base; bpe16384 → 131072+1 = 131073 model vocab):
#   compartment 0: random perm into [0,  V)
#   compartment 1: random perm into [V, 2V)
#   compartment 2: random perm into [2V, 3V)
#   compartment 3: random perm into [3V, 4V)
#   ...
#   compartment 7: random perm into [7V, 8V)
#
# Weight distribution at tr=0.5 absolute (same as the shared-chunk variant):
#   - comp-only mass 0.5, split equally between comp 0 and comp 1
#   - translation mass 0.5, split uniformly across 7 source pairs
#     {(0,1), (0,2), ..., (0,7)}, both directions
#   - compartments 2..7 get ZERO plain LM mass.
#
# Contrasts the shared-chunk variant: are 6 decoys with their own vocab
# chunks different from 6 decoys sharing one vocab chunk?

[data]
train_bin = "data/fineweb350B-dedup-bpe16384/fineweb350b-dedup_train_*.bin"
val_bin = "data/fineweb350B-dedup-bpe16384/fineweb350b-dedup_val_*.bin"

[model]
size_tier = "8-256"
block_size = 64
vocab_size = 16384
weight_tying = false
use_rope = true
rope_base = 10000.0

[training]
max_iters = 1000000
eval_interval = 10000
eval_iters = 1
log_interval = 10
always_save_checkpoints = true
seed = 64

[optimizer]
learning_rate = 2e-5
weight_decay = 0

[system]
compile = true
dtype = "bfloat16"

[logging]
wandb_log = true
wandb_project = "translation-compression"
wandb_run_name = "8-256-n8-deceptive-2real-6distinct-tr05abs"
wandb_group = "bpe16384-rope-8-256-deceptive"
wandb_notes = "Deceptive c=8 variant B: 2 real + 6 distinct-chunk decoys (vocab=8V); tr=0.5 abs."

[experiment]
n_compartments = 8
max_compartments = 8
compartment_scaling = "real_2_decoys"
compartment_vocab_chunks = "0,1,2,3,4,5,6,7"
translation_ratio = 0.5
translation_ratio_mode = "absolute"
use_compartment_embeddings = true
permute_tokens_per_compartment = true
permute_input_tokens_per_compartment = true
translation_mode = "standard"
translation_chunk_size = 4
