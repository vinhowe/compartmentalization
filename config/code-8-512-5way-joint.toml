# 5-way suite: joint (c=1) on document-interleaved bins.
# Scale: 8-512 (8 layers, n_head=8, n_embd=512, block_size=512).
# eff_batch = 32 * 8 * 512 = 131,072 tok/iter -> 20,000 iters = 2.62B tokens.

[data]
train_bin = "bins/joint_mixed/train_*.bin"
val_bin = "bins/joint_mixed/val_python.bin"

[model]
n_layer = 8
n_head = 8
n_embd = 512
block_size = 512
vocab_size = 16384
weight_tying = false
use_rope = true
rope_base = 10000.0

[training]
max_iters = 20000
batch_size = 32
gradient_accumulation_steps = 8
eval_interval = 2000
eval_iters = 1
log_interval = 10
always_save_checkpoint = true
seed = 64

[optimizer]
learning_rate = 3e-4
weight_decay = 0.0

[lr]
decay_lr = true
warmup_iters = 1000
lr_decay_iters = 10000
min_lr = 3e-5

[system]
compile = true
dtype = "bfloat16"

[logging]
wandb_log = true
wandb_project = "translation-compression"
wandb_run_name = "code-8-512-5way-joint"
wandb_group = "code-5way-baselines"

[experiment]
n_compartments = 1
compartment_scaling = "equal"
translation_ratio = 0.0
translation_ratio_mode = "absolute"
max_compartments = 16
use_compartment_embeddings = true
permute_tokens_per_compartment = false
permute_input_tokens_per_compartment = true
translation_mode = "standard"
translation_chunk_size = 4
