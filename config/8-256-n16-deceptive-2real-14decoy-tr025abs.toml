# Deceptive c=16, shared-chunk variant at tr=0.25 (companion to the tr=0.1 cell).
# Same layout: comps 0/1 in chunks [0,V)/[V,2V); comps 2..15 share chunk [2V,3V)
# via distinct random perms. Only comps 0/1 see plain LM data.

[data]
train_bin = "data/fineweb350B-dedup-bpe16384/fineweb350b-dedup_train_*.bin"
val_bin = "data/fineweb350B-dedup-bpe16384/fineweb350b-dedup_val_*.bin"

[model]
size_tier = "8-256"
block_size = 64
vocab_size = 16384
weight_tying = false
use_rope = true
rope_base = 10000.0

[training]
max_iters = 1000000
eval_interval = 10000
eval_iters = 1
log_interval = 10
always_save_checkpoints = true
seed = 64

[optimizer]
learning_rate = 2e-5
weight_decay = 0

[system]
compile = true
dtype = "bfloat16"

[logging]
wandb_log = true
wandb_project = "translation-compression"
wandb_run_name = "8-256-n16-deceptive-2real-14decoy-tr025abs"
wandb_group = "bpe16384-rope-8-256-deceptive"
wandb_notes = "Deceptive c=16: 2 real + 14 decoys sharing vocab chunk 2 with distinct perms; tr=0.25 abs."

[experiment]
n_compartments = 16
max_compartments = 16
compartment_scaling = "real_2_decoys"
compartment_vocab_chunks = "0,1,2,2,2,2,2,2,2,2,2,2,2,2,2,2"
translation_ratio = 0.25
translation_ratio_mode = "absolute"
use_compartment_embeddings = true
permute_tokens_per_compartment = true
permute_input_tokens_per_compartment = true
translation_mode = "standard"
translation_chunk_size = 4
