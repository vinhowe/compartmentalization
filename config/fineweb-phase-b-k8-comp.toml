# Phase B: comp c=8 with cluster as compartment ID.
# Matches paper's marquee 8-512 fineweb recipe (size_tier 8-512, RoPE, no weight decay,
# no LR decay, lr=2e-5) with only n_compartments + data differing between arms.
# Total budget: 6,400 iters × 131,072 tok/iter = 0.84B tokens.

[data]
compartment_train_bins = ["bins/cluster_0/train_*.bin", "bins/cluster_1/train_*.bin", "bins/cluster_2/train_*.bin", "bins/cluster_3/train_*.bin", "bins/cluster_4/train_*.bin", "bins/cluster_5/train_*.bin", "bins/cluster_6/train_*.bin", "bins/cluster_7/train_*.bin"]
compartment_val_bins   = ["bins/cluster_0/val_*.bin", "bins/cluster_1/val_*.bin", "bins/cluster_2/val_*.bin", "bins/cluster_3/val_*.bin", "bins/cluster_4/val_*.bin", "bins/cluster_5/val_*.bin", "bins/cluster_6/val_*.bin", "bins/cluster_7/val_*.bin"]

[model]
n_layer = 8
n_head = 16
n_embd = 512
block_size = 64
vocab_size = 16384
weight_tying = false
use_rope = true
rope_base = 10000.0

[training]
max_iters = 25000
batch_size = 128
gradient_accumulation_steps = 16
eval_interval = 2000
eval_iters = 1
log_interval = 10
always_save_checkpoint = true
seed = 64

[optimizer]
learning_rate = 2e-5
weight_decay = 0

[lr]
warmup_iters = 1000
decay_lr = false

[system]
compile = true
dtype = "bfloat16"

[logging]
wandb_log = true
wandb_project = "translation-compression"
wandb_run_name = "fineweb-phase-b-k8-comp"
wandb_group = "fineweb-phase-b-k8"

[experiment]
n_compartments = 8
compartment_scaling = "equal"
translation_ratio = 0
translation_ratio_mode = "absolute"
max_compartments = 16
assignment_seed = 64
use_compartment_embeddings = true
permute_tokens_per_compartment = false
permute_input_tokens_per_compartment = true
translation_mode = "standard"
translation_chunk_size = 4
