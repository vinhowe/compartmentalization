# Bio compartmentation, Option B: smaller dataset + heavier augmentation
# 5k people: 10% BRIDGE, ~42.7% DECL-only, ~42.8% QA-only, 250 NEVER-SEEN.
# K=10 phrasings per DECL person. ~7800 params/person at 35M model.
# 2.67M training tokens; 15k steps = ~736 epochs (strong memorization regime).
# Goal: hit bio3-style 80%+ extraction baseline so compartmentation effects
# have meaningful dynamic range.

[data]
train_bin = "data/bio-comp-N5000-bridge10-seed42/bio_train_*.bin"
val_bin = ""

[model]
n_layer = 12
n_embd = 256
n_head = 8
block_size = 512
vocab_size = 50257
weight_tying = false
use_rope = true
rope_base = 10000.0

[training]
max_iters = 15000
batch_size = 32
gradient_accumulation_steps = 8
eval_interval = 500
eval_iters = 0
log_interval = 10
always_save_checkpoints = true
seed = 64

[optimizer]
learning_rate = 3e-4
weight_decay = 0.0

[lr]
decay_lr = true
warmup_iters = 1000
lr_decay_iters = 15000
min_lr = 3e-5

[system]
compile = true
dtype = "bfloat16"

[logging]
wandb_log = true
wandb_project = "translation-compression"
wandb_run_name = "bio-comp-aug-N5000-bridge10-K10"
wandb_group = "bio-compartmentation"
wandb_notes = "12-256 GPT-2 BPE, 5k people, 10% bridge, K=10 phrasings, ~736 epochs in 15k steps"

[experiment]
n_compartments = 1
compartment_scaling = "equal"
translation_ratio = 0
translation_ratio_mode = "absolute"
max_compartments = 16
use_compartment_embeddings = false
permute_tokens_per_compartment = false
permute_input_tokens_per_compartment = false
