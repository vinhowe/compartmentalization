# Multilingual experiment: SHARED tokenizer (Qwen3 152k).
# 12-256 model on EN+ZH wikipedia mix, single-epoch.
# Step count to be set after data prep reports actual ZH token count.
# Reference: data/wiki-mixed-shared-qwen3/

[data]
train_bin = "data/wiki-mixed-shared-qwen3-shuffled/wiki_train_*.bin"
val_bin = "data/wiki-mixed-shared-qwen3-shuffled/wiki_val_*.bin"

[model]
n_layer = 12
n_embd = 256
n_head = 8
block_size = 512
vocab_size = 151936
weight_tying = false
use_rope = true
rope_base = 10000.0

[training]
max_iters = 12000               # placeholder; will overwrite via CLI after prep
batch_size = 32                  # match compartmented for batch-for-batch comparability
gradient_accumulation_steps = 8  # effective batch 256
eval_interval = 500
eval_iters = 4
log_interval = 10
always_save_checkpoints = true
seed = 64

[optimizer]
learning_rate = 3e-4
weight_decay = 0.0

[lr]
decay_lr = true
warmup_iters = 1000
lr_decay_iters = 12000           # mirror max_iters
min_lr = 3e-5

[system]
compile = true
dtype = "bfloat16"

[logging]
wandb_log = true
wandb_project = "translation-compression"
wandb_run_name = "multilingual-shared-12-256-qwen3"
wandb_group = "multilingual-wiki-qwen3"
wandb_notes = "Shared Qwen3 152k vocab, EN+ZH wiki mixed 50/50, single-epoch"

[experiment]
n_compartments = 1
compartment_scaling = "equal"
translation_ratio = 0
translation_ratio_mode = "absolute"
max_compartments = 16
use_compartment_embeddings = false
permute_tokens_per_compartment = false
permute_input_tokens_per_compartment = false
